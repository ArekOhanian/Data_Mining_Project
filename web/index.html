<!DOCTYPE html>
<html>

<head>

<title>ShopWise Dashboard</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:#e2e8f0;
padding:40px;
}

h1{
text-align:center;
color:#6366f1;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
margin-bottom:25px;
}

button{
padding:10px 18px;
background:#6366f1;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
margin:5px;
}

button:hover{
background:#4f46e5;
}

select{
padding:10px;
border-radius:6px;
border:none;
background:#6366f1;
color:white;
margin-left:10px;
cursor:pointer;
}

input[type=file]{
padding:10px;
background:#6366f1;
border-radius:6px;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

th{
color:#94a3b8;
}

img{
margin-top:20px;
max-width:500px;
}

</style>

</head>

<body>

<h1>ShopWise Customer Clustering</h1>

<div class="card">

<input type="file" id="file">

<button onclick="preprocessFile()">Preprocess Data</button>

<button id="clusterBtn" disabled onclick="runClustering()">Run Clustering</button>

<p id="status">Ready</p>

</div>

<div class="card">

<h2>Dataset Summary</h2>

<div id="datasetInfo"></div>

</div>

<div class="card">

<h2>Cluster Distribution</h2>

<div id="clusterStats"></div>

<img id="clusterGraph">

</div>

<div class="card">

<h2>Customer Preview</h2>

<label>Sort By:</label>

<select id="sortSelect" onchange="sortTable()">

<option value="Customer ID">Customer ID</option>
<option value="Cluster">Cluster</option>
<option value="Age">Age</option>
<option value="Review Rating">Review Rating</option>
<option value="Purchase Amount (USD)">Purchase Amount</option>

</select>

<table id="resultsTable">

<thead>

<tr>
<th>Customer ID</th>
<th>Age</th>
<th>Gender</th>
<th>Purchase Amount</th>
<th>Review Rating</th>
<th>Cluster</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script src="/eel.js"></script>

<script>

const status=document.getElementById("status")
const clusterBtn=document.getElementById("clusterBtn")

async function preprocessFile(){

const file=document.getElementById("file").files[0]

const reader=new FileReader()

reader.onload=async function(e){

const result=await eel.preprocess(e.target.result,file.name)()

status.innerText=result

showDatasetInfo()

}

reader.readAsText(file)

}

async function runClustering(){

const result=await eel.cluster()()

status.innerText=result

clusterBtn.disabled=false

updateTable()

showClusterStats()

showGraph()

}

async function updateTable(){

const data=await eel.get_results()()

const tbody=document.querySelector("#resultsTable tbody")

tbody.innerHTML=""

data.forEach(row=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${row["Customer ID"]}</td>
<td>${row["Age"]}</td>
<td>${row["Gender"]}</td>
<td>${row["Purchase Amount (USD)"]}</td>
<td>${row["Review Rating"]}</td>
<td>${row["Cluster"]}</td>

`

tbody.appendChild(tr)

})

}

async function sortTable(){

const column=document.getElementById("sortSelect").value

const data=await eel.get_sorted_results(column)()

const tbody=document.querySelector("#resultsTable tbody")

tbody.innerHTML=""

data.forEach(row=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${row["Customer ID"]}</td>
<td>${row["Age"]}</td>
<td>${row["Gender"]}</td>
<td>${row["Purchase Amount (USD)"]}</td>
<td>${row["Review Rating"]}</td>
<td>${row["Cluster"]}</td>

`

tbody.appendChild(tr)

})

}

async function showDatasetInfo(){

const info=await eel.get_dataset_info()()

if(!info.loaded) return

let html=`<p><b>${info.rows}</b> rows</p>`
html+=`<p><b>${info.columns}</b> columns</p>`
html+=`<p>${info.column_names.join(", ")}</p>`

document.getElementById("datasetInfo").innerHTML=html

}

async function showClusterStats(){

const stats=await eel.get_cluster_stats()()

let html=""

for(const cluster in stats){

html+=`<p>Cluster ${cluster}: ${stats[cluster]} customers</p>`

}

document.getElementById("clusterStats").innerHTML=html

}

async function showGraph(){

const img=await eel.get_cluster_graph()()

document.getElementById("clusterGraph").src="data:image/png;base64,"+img

}

</script>

</body>

</html>
