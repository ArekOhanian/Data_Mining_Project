  </div>

  <script type="text/javascript" src="/eel.js"></script>

  <script>
    const status = document.getElementById('status');
    const clusterBtn = document.getElementById('clusterBtn');
    const fileNameDisplay = document.getElementById('fileName');

    document.getElementById('file').addEventListener('change', function() {
      const file = this.files[0];
      fileNameDisplay.textContent = file ? `Selected: ${file.name}` : 'No file selected';
    });

    async function preprocessFile() {
      const file = document.getElementById('file').files[0];
      if (!file) return alert('Select a file first');

      status.textContent = 'Preprocessing...';
      status.className = '';

      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const result = await eel.preprocess(e.target.result, file.name)();
          status.textContent = result;
          if (result.includes('Success')) {
            status.className = 'success';
            clusterBtn.disabled = false;
            showDatasetInfo();
          } else {
            status.className = 'error';
          }
        } catch (err) {
          status.textContent = 'Frontend error: ' + err.message;
          status.className = 'error';
          console.error('Preprocess failed:', err);
        }
      };
      reader.readAsText(file);
    }

    async function runClustering() {
      status.textContent = 'Clustering...';
      status.className = '';

      try {
        const result = await eel.cluster()();
        status.textContent = result;
        if (result.includes('done')) {
          status.className = 'success';
          updateTable();
        } else {
          status.className = 'error';
        }
      } catch (err) {
        status.textContent = 'Clustering error: ' + err.message;
        status.className = 'error';
      }
    }

    async function updateTable() {
      try {
        const data = await eel.get_results()();
        const tbody = document.querySelector('#resultsTable tbody');
        tbody.innerHTML = '';
        data.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row['Customer ID'] || '-'}</td>
            <td>${row['Age'] || '-'}</td>
            <td>${row['Gender'] || '-'}</td>
            <td>${row['Purchase Amount (USD)'] || '-'}</td>
            <td>${row['Review Rating'] || '-'}</td>
            <td>${row['Cluster'] || '-'}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        status.textContent = 'Table error: ' + err.message;
        status.className = 'error';
      }
    }

    async function showDatasetInfo() {
      try {
        const info = await eel.get_dataset_info()();
        const div = document.getElementById('datasetInfo');

        if (!info.loaded) {
          div.innerHTML = "No dataset loaded.";
          return;
        }

        let html = `<p><strong>Success!</strong> ${info.rows} rows × ${info.columns} columns</p>`;
        html += '<p><strong>Columns:</strong> ' + info.column_names.join(', ') + '</p>';
        html += '<h3>First 5 rows:</h3>';
        html += '<table><thead><tr>';

        if (info.first_5_rows.length > 0) {
          Object.keys(info.first_5_rows[0]).forEach(key => {
            html += `<th>${key}</th>`;
          });

          html += '</tr></thead><tbody>';

          info.first_5_rows.forEach(row => {
            html += '<tr>';
            Object.values(row).forEach(val => {
              html += `<td>${val}</td>`;
            });
            html += '</tr>';
          });

          html += '</tbody></table>';
        }

        div.innerHTML = html;
      } catch (err) {
        document.getElementById('datasetInfo').innerHTML = 'Info error: ' + err.message;
      }
    }
  </script>
</body>
</html>
